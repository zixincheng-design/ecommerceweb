<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>网站架构 & 页面参考</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, "PingFang SC", sans-serif;
    background: #f7f6f2;
    color: #1a1a1a;
    -webkit-font-smoothing: antialiased;
  }
  .container { max-width: 720px; margin: 0 auto; padding: 16px; }

  .ia {
    background: #fff;
    border-radius: 12px;
    padding: 12px;
    border: 1px solid rgba(0,0,0,0.06);
  }
  .ia svg { width: 100%; height: auto; display: block; }
  .ia g.clickable { cursor: pointer; transition: opacity 0.15s; }
  .ia g.clickable:hover { opacity: 0.7; }
  .ia g.clickable:active { opacity: 0.5; }
  .ia text.clickable-text { cursor: pointer; }
  .ia text.clickable-text:hover { fill: #000 !important; }

  .preview {
    margin-top: 16px;
    background: #fff;
    border-radius: 12px;
    border: 1px solid rgba(0,0,0,0.06);
    min-height: 360px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 12px;
    position: relative;
  }
  .preview img {
    max-width: 100%;
    max-height: 70vh;
    object-fit: contain;
    display: none;
    border-radius: 8px;
  }
  .preview .placeholder {
    color: #999;
    font-size: 14px;
    text-align: center;
    line-height: 1.6;
  }
  .preview .placeholder .hint {
    font-size: 12px;
    color: #bbb;
    margin-top: 4px;
  }
  .preview .caption {
    position: absolute;
    bottom: 8px;
    left: 0;
    right: 0;
    text-align: center;
    font-size: 12px;
    color: #888;
    display: none;
  }
</style>
</head>
<body>
<div class="container">

  <!-- 信息架构图（原 SVG 配色，重新布局） -->
  <div class="ia">
    <svg width="100%" viewBox="0 0 680 350" role="img" xmlns="http://www.w3.org/2000/svg">
      <title>Site information architecture</title>
      <desc>点击任一节点，下方显示对应页面参考图。</desc>
      <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </marker>
      </defs>

      <!-- Home -->
      <g class="clickable" onclick="show('home')">
        <rect x="280" y="20" width="120" height="40" rx="8" style="fill:rgb(241,239,232);stroke:rgb(95,94,90);stroke-width:0.5px"/>
        <text x="340" y="40" text-anchor="middle" dominant-baseline="central" style="fill:rgb(68,68,65);font-family:-apple-system,sans-serif;font-size:14px;font-weight:500">Home</text>
      </g>

      <!-- Home → bus -->
      <line x1="340" y1="60" x2="340" y2="80" stroke="rgb(137,135,129)" stroke-width="0.5"/>
      <line x1="80"  y1="80" x2="610" y2="80" stroke="rgb(137,135,129)" stroke-width="0.5"/>

      <!-- bus → main nav -->
      <line x1="80"  y1="80" x2="80"  y2="100" marker-end="url(#arrow)" style="stroke:rgb(137,135,129);stroke-width:1.5px"/>
      <line x1="188" y1="80" x2="188" y2="100" marker-end="url(#arrow)" style="stroke:rgb(137,135,129);stroke-width:1.5px"/>
      <line x1="296" y1="80" x2="296" y2="100" marker-end="url(#arrow)" style="stroke:rgb(137,135,129);stroke-width:1.5px"/>
      <line x1="404" y1="80" x2="404" y2="100" marker-end="url(#arrow)" style="stroke:rgb(137,135,129);stroke-width:1.5px"/>
      <line x1="512" y1="80" x2="512" y2="100" marker-end="url(#arrow)" style="stroke:rgb(137,135,129);stroke-width:1.5px"/>
      <line x1="610" y1="80" x2="610" y2="100" marker-end="url(#arrow)" style="stroke:rgb(137,135,129);stroke-width:1.5px"/>

      <!-- Shop All (gray, leftmost) -->
      <g class="clickable" onclick="show('shopall')">
        <rect x="30" y="100" width="100" height="80" rx="8" style="fill:rgb(241,239,232);stroke:rgb(95,94,90);stroke-width:0.5px"/>
        <text x="80" y="130" text-anchor="middle" dominant-baseline="central" style="fill:rgb(68,68,65);font-family:-apple-system,sans-serif;font-size:13px;font-weight:500">Shop All</text>
        <text x="80" y="150" text-anchor="middle" dominant-baseline="central" style="fill:rgb(95,94,90);font-family:-apple-system,sans-serif;font-size:11px">全部商品</text>
      </g>

      <!-- Squishy world (blue) -->
      <g class="clickable" onclick="show('squishy')">
        <rect x="138" y="100" width="100" height="80" rx="8" style="fill:rgb(230,241,251);stroke:rgb(24,95,165);stroke-width:0.5px"/>
        <text x="188" y="130" text-anchor="middle" dominant-baseline="central" style="fill:rgb(12,68,124);font-family:-apple-system,sans-serif;font-size:13px;font-weight:500">Squishy world</text>
        <text x="188" y="150" text-anchor="middle" dominant-baseline="central" style="fill:rgb(24,95,165);font-family:-apple-system,sans-serif;font-size:11px">捏捏</text>
      </g>

      <!-- Metal lab (blue) -->
      <g class="clickable" onclick="show('metal')">
        <rect x="246" y="100" width="100" height="80" rx="8" style="fill:rgb(230,241,251);stroke:rgb(24,95,165);stroke-width:0.5px"/>
        <text x="296" y="130" text-anchor="middle" dominant-baseline="central" style="fill:rgb(12,68,124);font-family:-apple-system,sans-serif;font-size:13px;font-weight:500">Metal lab</text>
        <text x="296" y="150" text-anchor="middle" dominant-baseline="central" style="fill:rgb(24,95,165);font-family:-apple-system,sans-serif;font-size:11px">金属</text>
      </g>

      <!-- Build your own (coral) -->
      <g class="clickable" onclick="show('build_squish')">
        <rect x="354" y="100" width="100" height="80" rx="8" style="fill:rgb(250,236,231);stroke:rgb(153,60,29);stroke-width:0.5px"/>
        <text x="404" y="122" text-anchor="middle" dominant-baseline="central" style="fill:rgb(113,43,19);font-family:-apple-system,sans-serif;font-size:13px;font-weight:500">Build your own</text>
        <text x="404" y="144" text-anchor="middle" dominant-baseline="central" class="clickable-text" onclick="event.stopPropagation();show('build_squish')" style="fill:rgb(153,60,29);font-family:-apple-system,sans-serif;font-size:11px">▸ Squishy tool</text>
        <text x="404" y="164" text-anchor="middle" dominant-baseline="central" class="clickable-text" onclick="event.stopPropagation();show('build_metal')" style="fill:rgb(153,60,29);font-family:-apple-system,sans-serif;font-size:11px">▸ Spinner tool</text>
      </g>

      <!-- Store and contact (teal, right of BYO) -->
      <g class="clickable" onclick="show('store')">
        <rect x="462" y="100" width="100" height="80" rx="8" style="fill:rgb(225,245,238);stroke:rgb(15,110,86);stroke-width:0.5px"/>
        <text x="512" y="128" text-anchor="middle" dominant-baseline="central" style="fill:rgb(8,80,65);font-family:-apple-system,sans-serif;font-size:13px;font-weight:500">Store &amp;</text>
        <text x="512" y="146" text-anchor="middle" dominant-baseline="central" style="fill:rgb(8,80,65);font-family:-apple-system,sans-serif;font-size:13px;font-weight:500">Contact</text>
        <text x="512" y="166" text-anchor="middle" dominant-baseline="central" style="fill:rgb(15,110,86);font-family:-apple-system,sans-serif;font-size:11px">门店联系</text>
      </g>

      <!-- Account (purple, rightmost) -->
      <g class="clickable" onclick="show('account')">
        <rect x="570" y="100" width="80" height="80" rx="8" style="fill:rgb(238,237,254);stroke:rgb(83,74,183);stroke-width:0.5px"/>
        <text x="610" y="122" text-anchor="middle" dominant-baseline="central" style="fill:rgb(60,52,137);font-family:-apple-system,sans-serif;font-size:13px;font-weight:500">Account</text>
        <text x="610" y="140" text-anchor="middle" dominant-baseline="central" style="fill:rgb(83,74,183);font-family:-apple-system,sans-serif;font-size:11px">Login</text>
        <text x="610" y="156" text-anchor="middle" dominant-baseline="central" style="fill:rgb(83,74,183);font-family:-apple-system,sans-serif;font-size:11px">Dashboard</text>
        <text x="610" y="172" text-anchor="middle" dominant-baseline="central" style="fill:rgb(83,74,183);font-family:-apple-system,sans-serif;font-size:11px">Orders</text>
      </g>

      <!-- Squishy → Product detail (sub) -->
      <line x1="188" y1="180" x2="188" y2="200" marker-end="url(#arrow)" style="stroke:rgb(137,135,129);stroke-width:1.2px"/>
      <g class="clickable" onclick="show('pdp')">
        <rect x="138" y="200" width="100" height="36" rx="6" style="fill:#fff;stroke:rgb(24,95,165);stroke-width:0.8px;stroke-dasharray:3 2"/>
        <text x="188" y="218" text-anchor="middle" dominant-baseline="central" style="fill:rgb(12,68,124);font-family:-apple-system,sans-serif;font-size:11px;font-weight:500">Product detail</text>
      </g>

      <!-- Metal → Product detail (sub) -->
      <line x1="296" y1="180" x2="296" y2="200" marker-end="url(#arrow)" style="stroke:rgb(137,135,129);stroke-width:1.2px"/>
      <g class="clickable" onclick="show('pdp')">
        <rect x="246" y="200" width="100" height="36" rx="6" style="fill:#fff;stroke:rgb(24,95,165);stroke-width:0.8px;stroke-dasharray:3 2"/>
        <text x="296" y="218" text-anchor="middle" dominant-baseline="central" style="fill:rgb(12,68,124);font-family:-apple-system,sans-serif;font-size:11px;font-weight:500">Product detail</text>
      </g>

      <!-- PDP → Cart (dashed purchase flow) -->
      <line x1="188" y1="236" x2="188" y2="268" stroke="rgb(153,53,86)" stroke-width="0.8" stroke-dasharray="2 2"/>
      <line x1="296" y1="236" x2="296" y2="268" stroke="rgb(153,53,86)" stroke-width="0.8" stroke-dasharray="2 2"/>
      <line x1="188" y1="268" x2="296" y2="268" stroke="rgb(153,53,86)" stroke-width="0.8" stroke-dasharray="2 2"/>
      <line x1="242" y1="268" x2="242" y2="288" marker-end="url(#arrow)" style="stroke:rgb(153,53,86);stroke-width:1.2px"/>

      <!-- Cart -->
      <g class="clickable" onclick="show('cart')">
        <rect x="192" y="288" width="100" height="40" rx="8" style="fill:rgb(251,234,240);stroke:rgb(153,53,86);stroke-width:0.5px"/>
        <text x="242" y="308" text-anchor="middle" dominant-baseline="central" style="fill:rgb(114,36,62);font-family:-apple-system,sans-serif;font-size:13px;font-weight:500">Cart</text>
      </g>

      <!-- Cart → Checkout -->
      <line x1="292" y1="308" x2="378" y2="308" marker-end="url(#arrow)" style="stroke:rgb(153,53,86);stroke-width:1.2px"/>

      <!-- Checkout -->
      <g class="clickable" onclick="show('checkout')">
        <rect x="378" y="288" width="110" height="40" rx="8" style="fill:rgb(251,234,240);stroke:rgb(153,53,86);stroke-width:0.5px"/>
        <text x="433" y="308" text-anchor="middle" dominant-baseline="central" style="fill:rgb(114,36,62);font-family:-apple-system,sans-serif;font-size:13px;font-weight:500">Checkout</text>
      </g>
    </svg>
  </div>

  <!-- 单一图片占位区 -->
  <div class="preview">
    <img id="preview-img" src="" alt="" style="display:none">
    <div class="placeholder" id="placeholder">
      点击上方架构图任一节点<br>查看对应页面参考图
      <div class="hint">页面不会滚动</div>
    </div>
    <div class="caption" id="caption"></div>
  </div>

</div>

<script>
  const map = {
    home:         { src: 'IA_img/home.jpeg',                  label: 'Home' },
    shopall:      { src: 'IA_img/shopall.jpg',                label: 'Shop All' },
    squishy:      { src: 'IA_img/squishy.png',                label: 'Squishy world' },
    metal:        { src: 'IA_img/metal.png',                  label: 'Metal lab' },
    pdp:          { src: 'IA_img/productdetail.png',          label: 'Product Detail（Squishy / Metal 共用）' },
    build_squish: { src: 'IA_img/buildyourown_squish.png',    label: 'Build Your Own · Squishy tool' },
    build_metal:  { src: 'IA_img/buildyourown_metal.jpg',     label: 'Build Your Own · Spinner tool' },
    store:        { src: 'IA_img/storeandconnect.png',        label: 'Store & Contact' },
    account:      { src: 'IA_img/account.png',                label: 'Account' },
    cart:         { src: 'IA_img/cart.webp',                  label: 'Cart' },
    checkout:     { src: 'IA_img/checkout.png',               label: 'Checkout' }
  };

  function show(name) {
    const item = map[name];
    if (!item) return;
    const img = document.getElementById('preview-img');
    const ph  = document.getElementById('placeholder');
    const cap = document.getElementById('caption');

    img.style.display = 'none';
    ph.style.display = 'block';
    ph.innerHTML = '加载中…';
    cap.style.display = 'none';

    img.onload = function() {
      img.style.display = 'block';
      ph.style.display = 'none';
      cap.style.display = 'block';
      cap.textContent = item.label;
    };
    img.onerror = function() {
      img.style.display = 'none';
      ph.style.display = 'block';
      ph.innerHTML = item.label + '<br><span class="hint">参考图待补</span>';
      cap.style.display = 'none';
    };
    img.src = item.src;
  }
</script>
</body>
</html>
